<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Stock Details - Labh</title>
  <meta name="description" id="pageDescription" content="View detailed stock information, fundamentals, and analysis on Labh.">
  <meta name="keywords" id="pageKeywords" content="stock analysis, stock fundamentals, investment, NSE, BSE, Indian stocks, Labh">

  <!-- Canonical URL -->

  <!-- Open Graph / Facebook -->

  <meta property="og:title" id="ogTitle" content="Stock Details - Labh">
  <meta property="og:description" id="ogDescription" content="View detailed stock information, fundamentals, and analysis on Labh.">
  <meta property="og:image" content="https://labh.io/assets/LOGO.png">
  <meta property="og:site_name" content="Labh">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="apple-touch-icon" href="/assets/LOGO.png">

  <!-- Fonts -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <!-- DNS Prefetch for API -->
  <link rel="dns-prefetch" href="https://api.labh.io">
  <link rel="preconnect" href="https://api.labh.io" crossorigin>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Structured Data (will be populated dynamically) -->
  <script type="application/ld+json" id="structuredData">
  {
    "@context": "https://schema.org",
    "@type": "FinancialProduct",
    "name": "Stock Details",
    "provider": {
      "@type": "Organization",
      "name": "Labh",
      "url": "https://labh.io"
    }
  }
  </script>

  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #5b21b6;
      --purple-light: #a78bfa;
      --black: #0a0a0a;
      --dark: #1a1a2e;
      --dark-surface: #16162a;
      --green: #22c55e;
      --red: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--black);
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 1200px;
      background-color: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 1rem;
      padding: 0.6rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .navbar-brand img {
      height: 32px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: var(--purple-light);
    }

    .btn-primary {
      background-color: var(--purple);
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
      background-color: var(--purple-dark);
    }

    /* Header Section */
    .stock-header {
      padding: 8rem 2rem 3rem;
      background: radial-gradient(ellipse at 50% 0%, var(--purple-dark) 0%, var(--black) 70%);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .stock-title-section {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .stock-info {
      flex: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--purple-light);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--purple);
    }

    .stock-name {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .stock-symbol {
      font-size: 1.25rem;
      color: #999;
      margin-bottom: 1rem;
    }

    .stock-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid var(--purple);
      color: var(--purple-light);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .stock-price-section {
      background: rgba(22, 22, 42, 0.6);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 1rem;
      padding: 1.5rem;
      min-width: 280px;
    }

    .current-price {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .price-change {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 600;
    }

    .price-change.positive {
      color: var(--green);
    }

    .price-change.negative {
      color: var(--red);
    }

    .price-meta {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(124, 58, 237, 0.2);
      color: #999;
      font-size: 0.875rem;
    }

    /* Main Content */
    .main-content {
      padding: 3rem 2rem;
      background-color: var(--dark);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .card {
      background: rgba(22, 22, 42, 0.6);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 1rem;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .metric-label {
      color: #999;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .metric-value {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #999;
      font-size: 0.95rem;
    }

    .info-value {
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .full-width-card {
      grid-column: 1 / -1;
    }

    /* Chart Container */
    .chart-container {
      position: relative;
      height: 400px;
      margin-bottom: 1rem;
    }

    .chart-controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .chart-control-btn {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: #ccc;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .chart-control-btn:hover {
      background: rgba(124, 58, 237, 0.3);
      color: #fff;
    }

    .chart-control-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    /* Officers List */
    .officers-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .officer-item {
      display: flex;
      justify-content: space-between;
      align-items: start;
      padding: 1rem;
      background: rgba(42, 42, 62, 0.4);
      border-radius: 0.75rem;
    }

    .officer-name {
      color: #fff;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .officer-title {
      color: #999;
      font-size: 0.875rem;
    }

    .officer-year {
      color: #666;
      font-size: 0.875rem;
    }

    /* Stats Grid */
    .stats-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    /* Loading State */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1rem;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      border-top-color: var(--purple);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #999;
      font-size: 1.125rem;
    }

    /* Error State */
    .error-container {
      text-align: center;
      padding: 4rem 2rem;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      fill: #ef4444;
    }

    .error-title {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .error-message {
      color: #999;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .stock-title-section {
        flex-direction: column;
      }

      .stock-price-section {
        width: 100%;
      }

      .stock-name {
        font-size: 2rem;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid-3 {
        grid-template-columns: 1fr;
      }

      .nav-links {
        display: none;
      }

      .chart-container {
        height: 300px;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.1) 25%, rgba(124, 58, 237, 0.2) 50%, rgba(124, 58, 237, 0.1) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="/" class="navbar-brand" aria-label="Labh home">
      <img src="/assets/LOGO.png" alt="Labh - Smart Investing Platform Logo" width="32" height="32">
      Labh
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link" aria-label="Go to homepage">Home</a>
      <a href="/search.html" class="nav-link" aria-label="Search stocks">Search</a>
      <a href="https://calendar.app.google/gTCE7fH4o5fuSBpWA" class="btn-primary" aria-label="Contact us">Contact</a>
    </div>
  </nav>

  <!-- Stock Header -->
  <header class="stock-header" id="stockHeader" role="banner">
    <div class="container">
      <div id="headerContent"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" role="main">
    <div class="container">
      <div id="mainContent"></div>
    </div>
  </main>

  <!-- No JavaScript Warning -->
  <noscript>
    <div style="padding: 2rem; text-align: center; background: #1a1a2e; color: #fff;">
      <h1>JavaScript Required</h1>
      <p>This page requires JavaScript to display stock data. Please enable JavaScript in your browser settings.</p>
      <a href="/search.html" style="color: #7c3aed; text-decoration: underline;">Return to Search</a>
    </div>
  </noscript>

  <script>
    // Get symbol from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const symbol = urlParams.get('symbol');

    // API Configuration
    const API_URL = 'https://api.labh.io/open/stock-fundamentals';

    // Initialize page
    if (!symbol) {
      showError('No stock symbol provided', 'Please select a stock from the search page.');
    } else {
      loadStockData(symbol);
    }

    // Fetch stock data from API
    async function loadStockData(symbol) {
      showLoading();

      try {
        const response = await fetch(`${API_URL}?symbol=${symbol}.NSE`);

        if (!response.ok) {
          throw new Error('Failed to fetch stock data');
        }

        const data = await response.json();
        displayStockData(data, symbol);
      } catch (error) {
        console.error('Error loading stock data:', error);
        showError('Failed to load stock data', 'Please try again later or contact support.');
      }
    }

    // Display stock data
    function displayStockData(data, symbol) {
      // Extract data from API response structure
      const general = data.fundamentals?.General || {};
      const highlights = data.fundamentals?.Highlights || {};
      const valuation = data.fundamentals?.Valuation || {};
      const technicals = data.fundamentals?.Technicals || {};
      const dividends = data.fundamentals?.SplitsDividends || {};
      const priceHistory = data.last_5_years_price || [];

      // Get current and previous price from price history
      const currentPriceData = priceHistory[priceHistory.length - 1] || {};
      const previousPriceData = priceHistory[priceHistory.length - 2] || {};
      const currentPrice = currentPriceData.price || 0;
      const previousClose = previousPriceData.price || currentPrice;
      const priceChange = currentPrice - previousClose;
      const priceChangePercent = previousClose ? ((priceChange / previousClose) * 100) : 0;
      const isPositive = priceChange >= 0;

      const stockName = general.Name || symbol;

      // Header Content
      const headerHTML = `
        <div class="stock-title-section">
          <div class="stock-info">
            <nav aria-label="Breadcrumb">
              <a href="/search.html" class="back-link" aria-label="Return to stock search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>
                </svg>
                Back to Search
              </a>
            </nav>
            <h1 class="stock-name" itemprop="name">${stockName}</h1>
            <div class="stock-symbol" aria-label="Stock symbol and exchange">${general.Code || symbol} • ${general.Exchange || 'NSE'}</div>
            <div class="stock-tags" role="list" aria-label="Stock categories">
              <span class="tag" role="listitem">${general.Sector || 'N/A'}</span>
              <span class="tag" role="listitem">${general.Industry || 'N/A'}</span>
            </div>
          </div>
          <div class="stock-price-section">
            <div class="current-price">₹${formatNumber(currentPrice)}</div>
            <div class="price-change ${isPositive ? 'positive' : 'negative'}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                ${isPositive
                  ? '<path d="M7,15L12,10L17,15H7Z"/>'
                  : '<path d="M7,10L12,15L17,10H7Z"/>'
                }
              </svg>
              ${isPositive ? '+' : ''}${formatNumber(priceChange)} (${isPositive ? '+' : ''}${priceChangePercent.toFixed(2)}%)
            </div>
            <div class="price-meta">
              As of ${currentPriceData.date ? new Date(currentPriceData.date).toLocaleDateString() : new Date().toLocaleDateString()}
            </div>
          </div>
        </div>
      `;

      // Main Content
      const mainHTML = `
        <!-- Price Chart -->
        <article class="card full-width-card">
          <h2 class="card-title">Price History</h2>
          <div class="chart-controls" role="group" aria-label="Time period selection">
            <button class="chart-control-btn active" data-period="1M" aria-label="Show 1 month price history">1M</button>
            <button class="chart-control-btn" data-period="3M" aria-label="Show 3 months price history">3M</button>
            <button class="chart-control-btn" data-period="6M" aria-label="Show 6 months price history">6M</button>
            <button class="chart-control-btn" data-period="1Y" aria-label="Show 1 year price history">1Y</button>
            <button class="chart-control-btn" data-period="5Y" aria-label="Show 5 years price history">5Y</button>
            <button class="chart-control-btn" data-period="ALL" aria-label="Show all available price history">All</button>
          </div>
          <div class="chart-container" role="img" aria-label="Stock price chart showing historical performance">
            <canvas id="priceChart"></canvas>
          </div>
        </article>

        <div class="content-grid">
          <!-- Key Metrics -->
          <div class="card">
            <h2 class="card-title">Key Metrics</h2>
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">Market Cap</div>
                <div class="metric-value">₹${formatLargeNumber(highlights.MarketCapitalization || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">P/E Ratio</div>
                <div class="metric-value">${formatNumber(highlights.PERatio || valuation.TrailingPE || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">52 Week High</div>
                <div class="metric-value">₹${formatNumber(technicals['52WeekHigh'] || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">52 Week Low</div>
                <div class="metric-value">₹${formatNumber(technicals['52WeekLow'] || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Revenue (TTM)</div>
                <div class="metric-value">₹${formatLargeNumber(highlights.RevenueTTM || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Employees</div>
                <div class="metric-value">${formatNumber(general.FullTimeEmployees || 0)}</div>
              </div>
            </div>
          </div>

          <!-- Quick Info -->
          <div class="card">
            <h2 class="card-title">Quick Info</h2>
            <div>
              <div class="info-row">
                <span class="info-label">Current Price</span>
                <span class="info-value">₹${formatNumber(currentPrice)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Previous Close</span>
                <span class="info-value">₹${formatNumber(previousClose)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">50 Day MA</span>
                <span class="info-value">₹${formatNumber(technicals['50DayMA'] || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">200 Day MA</span>
                <span class="info-value">₹${formatNumber(technicals['200DayMA'] || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Beta</span>
                <span class="info-value">${formatNumber(technicals.Beta || 0)}</span>
              </div>
            </div>
          </div>

          <!-- Financial Ratios -->
          <div class="card">
            <h2 class="card-title">Financial Ratios</h2>
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">EPS (TTM)</div>
                <div class="metric-value">₹${formatNumber(highlights.EarningsShare || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">P/B Ratio</div>
                <div class="metric-value">${formatNumber(valuation.PriceBookMRQ || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Dividend Yield</div>
                <div class="metric-value">${formatPercent(dividends.ForwardAnnualDividendYield || highlights.DividendYield || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">ROE</div>
                <div class="metric-value">${formatPercent(highlights.ReturnOnEquityTTM || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">ROA</div>
                <div class="metric-value">${formatPercent(highlights.ReturnOnAssetsTTM || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Profit Margin</div>
                <div class="metric-value">${formatPercent(highlights.ProfitMargin || 0)}</div>
              </div>
            </div>
          </div>

          <!-- Valuation Metrics -->
          <div class="card">
            <h2 class="card-title">Valuation</h2>
            <div>
              <div class="info-row">
                <span class="info-label">Enterprise Value</span>
                <span class="info-value">₹${formatLargeNumber(valuation.EnterpriseValue || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">EV/Revenue</span>
                <span class="info-value">${formatNumber(valuation.EnterpriseValueRevenue || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">EBITDA</span>
                <span class="info-value">₹${formatLargeNumber(highlights.EBITDA || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Book Value</span>
                <span class="info-value">₹${formatNumber(highlights.BookValue || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Forward P/E</span>
                <span class="info-value">${formatNumber(valuation.ForwardPE || 0)}</span>
              </div>
            </div>
          </div>

          <!-- Dividends -->
          ${dividends.ForwardAnnualDividendRate ? `
          <div class="card">
            <h2 class="card-title">Dividends</h2>
            <div>
              <div class="info-row">
                <span class="info-label">Annual Dividend</span>
                <span class="info-value">₹${formatNumber(dividends.ForwardAnnualDividendRate || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Dividend Yield</span>
                <span class="info-value">${formatPercent(dividends.ForwardAnnualDividendYield || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Payout Ratio</span>
                <span class="info-value">${formatPercent(dividends.PayoutRatio || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Ex-Dividend Date</span>
                <span class="info-value">${dividends.ExDividendDate || 'N/A'}</span>
              </div>
            </div>
          </div>
          ` : ''}

          <!-- Growth Metrics -->
          <div class="card">
            <h2 class="card-title">Growth Metrics</h2>
            <div class="stats-grid-3">
              <div class="metric">
                <div class="metric-label">Revenue Growth (YoY)</div>
                <div class="metric-value">${formatPercent(highlights.QuarterlyRevenueGrowthYOY || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Earnings Growth (YoY)</div>
                <div class="metric-value">${formatPercent(highlights.QuarterlyEarningsGrowthYOY || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Operating Margin</div>
                <div class="metric-value">${formatPercent(highlights.OperatingMarginTTM || 0)}</div>
              </div>
            </div>
          </div>

          <!-- Analyst Targets -->
          ${highlights.WallStreetTargetPrice ? `
          <div class="card">
            <h2 class="card-title">Analyst Targets</h2>
            <div>
              <div class="info-row">
                <span class="info-label">Target Price</span>
                <span class="info-value">₹${formatNumber(highlights.WallStreetTargetPrice || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Upside Potential</span>
                <span class="info-value ${((highlights.WallStreetTargetPrice - currentPrice) / currentPrice) >= 0 ? 'price-change positive' : 'price-change negative'}">${formatPercent((highlights.WallStreetTargetPrice - currentPrice) / currentPrice || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">EPS Estimate (Current Year)</span>
                <span class="info-value">₹${formatNumber(highlights.EPSEstimateCurrentYear || 0)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">EPS Estimate (Next Year)</span>
                <span class="info-value">₹${formatNumber(highlights.EPSEstimateNextYear || 0)}</span>
              </div>
            </div>
          </div>
          ` : ''}

          <!-- Additional Metrics -->
          <div class="card full-width-card">
            <h2 class="card-title">Additional Metrics</h2>
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">Shares Outstanding</div>
                <div class="metric-value">${formatLargeNumber(data.fundamentals?.SharesStats?.SharesOutstanding || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Float</div>
                <div class="metric-value">${formatLargeNumber(data.fundamentals?.SharesStats?.SharesFloat || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Insider Ownership</div>
                <div class="metric-value">${formatPercent((data.fundamentals?.SharesStats?.PercentInsiders || 0) / 100)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Institutional Ownership</div>
                <div class="metric-value">${formatPercent((data.fundamentals?.SharesStats?.PercentInstitutions || 0) / 100)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Gross Profit (TTM)</div>
                <div class="metric-value">₹${formatLargeNumber(highlights.GrossProfitTTM || 0)}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Revenue Per Share</div>
                <div class="metric-value">₹${formatNumber(highlights.RevenuePerShareTTM || 0)}</div>
              </div>
            </div>
          </div>

          <!-- Company Officers -->
          ${general.Officers && Object.keys(general.Officers).length > 0 ? `
          <div class="card full-width-card">
            <h2 class="card-title">Key Management</h2>
            <div class="officers-list">
              ${Object.values(general.Officers).slice(0, 5).map(officer => `
                <div class="officer-item">
                  <div>
                    <div class="officer-name">${officer.Name || 'N/A'}</div>
                    <div class="officer-title">${officer.Title || 'N/A'}</div>
                  </div>
                  ${officer.YearBorn && officer.YearBorn !== 'NA' ? `<div class="officer-year">Born: ${officer.YearBorn}</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
          ` : ''}

          <!-- Company Info -->
          ${general.Description ? `
          <div class="card full-width-card">
            <h2 class="card-title">About ${stockName}</h2>
            <p style="color: #ccc; line-height: 1.7; margin-bottom: 1rem;">${general.Description}</p>
            ${general.WebURL ? `<a href="${general.WebURL}" target="_blank" rel="noopener noreferrer" class="btn-primary" style="display: inline-block; text-decoration: none;">Visit Website</a>` : ''}
          </div>
          ` : ''}
        </div>
      `;

      document.getElementById('headerContent').innerHTML = headerHTML;
      document.getElementById('mainContent').innerHTML = mainHTML;

      // Update SEO meta tags
      updateSEOTags(data, symbol, currentPrice, priceChange, priceChangePercent);

      // Initialize chart after content is loaded
      setTimeout(() => {
        initPriceChart(priceHistory, isPositive);
      }, 100);
    }

    // Update SEO meta tags and structured data
    function updateSEOTags(data, symbol, currentPrice, priceChange, priceChangePercent) {
      const general = data.fundamentals?.General || {};
      const highlights = data.fundamentals?.Highlights || {};
      const technicals = data.fundamentals?.Technicals || {};

      const stockName = general.Name || symbol;
      const sector = general.Sector || 'Stock';
      const industry = general.Industry || '';
      const exchange = general.Exchange || 'NSE';

      // Page Title
      const title = `${stockName} (${symbol}) Stock Price & Analysis | Labh`;
      document.getElementById('pageTitle').textContent = title;
      document.title = title;

      // Meta Description
      const description = `Get detailed analysis of ${stockName} stock. Current price: ₹${formatNumber(currentPrice)}, Change: ${priceChange >= 0 ? '+' : ''}${priceChangePercent.toFixed(2)}%. View fundamentals, financials, charts & more on Labh.`;
      document.getElementById('pageDescription').setAttribute('content', description);

      // Keywords
      const keywords = `${stockName}, ${symbol}, ${sector}, ${industry}, stock price, stock analysis, NSE, BSE, Indian stocks, fundamentals, P/E ratio, market cap, Labh`;
      document.getElementById('pageKeywords').setAttribute('content', keywords);

      // Canonical URL
      const canonicalUrl = `https://labh.io/stocks/details.html?symbol=${symbol}`;
      document.getElementById('canonicalUrl').setAttribute('href', canonicalUrl);

      // Open Graph
      document.getElementById('ogUrl').setAttribute('content', canonicalUrl);
      document.getElementById('ogTitle').setAttribute('content', title);
      document.getElementById('ogDescription').setAttribute('content', description);

      // Twitter Card
      document.getElementById('twitterTitle').setAttribute('content', title);
      document.getElementById('twitterDescription').setAttribute('content', description);

      // Structured Data
      const structuredData = {
        "@context": "https://schema.org",
        "@type": "FinancialProduct",
        "name": stockName,
        "description": general.Description || `${stockName} stock listed on ${exchange}`,
        "category": sector,
        "provider": {
          "@type": "Organization",
          "name": general.Name || stockName,
          "url": general.WebURL || "https://labh.io",
          "logo": general.LogoURL ? `https://labh.io${general.LogoURL}` : "https://labh.io/assets/LOGO.png",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": general.AddressData?.Street || general.Address || "",
            "addressLocality": general.AddressData?.City || "",
            "addressCountry": general.AddressData?.Country || general.CountryName || "India"
          }
        },
        "offers": {
          "@type": "Offer",
          "price": currentPrice,
          "priceCurrency": general.CurrencyCode || "INR",
          "availability": "https://schema.org/InStock",
          "url": canonicalUrl
        },
        "aggregateRating": highlights.PERatio ? {
          "@type": "AggregateRating",
          "ratingValue": Math.min(5, Math.max(1, 5 - (highlights.PERatio - 15) / 10)),
          "reviewCount": "1000",
          "bestRating": "5",
          "worstRating": "1"
        } : undefined,
        "brand": {
          "@type": "Brand",
          "name": stockName
        },
        "additionalProperty": [
          {
            "@type": "PropertyValue",
            "name": "Symbol",
            "value": symbol
          },
          {
            "@type": "PropertyValue",
            "name": "Exchange",
            "value": exchange
          },
          {
            "@type": "PropertyValue",
            "name": "Sector",
            "value": sector
          },
          {
            "@type": "PropertyValue",
            "name": "Industry",
            "value": industry
          },
          {
            "@type": "PropertyValue",
            "name": "Market Cap",
            "value": formatLargeNumber(highlights.MarketCapitalization || 0)
          },
          {
            "@type": "PropertyValue",
            "name": "P/E Ratio",
            "value": formatNumber(highlights.PERatio || 0)
          },
          {
            "@type": "PropertyValue",
            "name": "52 Week High",
            "value": formatNumber(technicals['52WeekHigh'] || 0)
          },
          {
            "@type": "PropertyValue",
            "name": "52 Week Low",
            "value": formatNumber(technicals['52WeekLow'] || 0)
          }
        ]
      };

      // Update structured data
      const structuredDataScript = document.getElementById('structuredData');
      if (structuredDataScript) {
        structuredDataScript.textContent = JSON.stringify(structuredData, null, 2);
      }

      // Add breadcrumb structured data
      const breadcrumbData = {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://labh.io"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Search",
            "item": "https://labh.io/search.html"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": stockName,
            "item": canonicalUrl
          }
        ]
      };

      // Create breadcrumb script if it doesn't exist
      let breadcrumbScript = document.getElementById('breadcrumbData');
      if (!breadcrumbScript) {
        breadcrumbScript = document.createElement('script');
        breadcrumbScript.type = 'application/ld+json';
        breadcrumbScript.id = 'breadcrumbData';
        document.head.appendChild(breadcrumbScript);
      }
      breadcrumbScript.textContent = JSON.stringify(breadcrumbData, null, 2);
    }

    // Initialize price chart
    let priceChart = null;
    let allPriceData = [];

    function initPriceChart(priceHistory, isPositive) {
      allPriceData = priceHistory;

      const ctx = document.getElementById('priceChart');
      if (!ctx) return;

      // Filter data for 1 month by default
      const filteredData = filterPriceData(priceHistory, '1M');

      const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, isPositive ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

      priceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: filteredData.map(d => d.date),
          datasets: [{
            label: 'Price',
            data: filteredData.map(d => d.price),
            borderColor: isPositive ? '#22c55e' : '#ef4444',
            backgroundColor: gradient,
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: isPositive ? '#22c55e' : '#ef4444',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            intersect: false,
            mode: 'index'
          },
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              backgroundColor: 'rgba(22, 22, 42, 0.95)',
              titleColor: '#fff',
              bodyColor: '#ccc',
              borderColor: 'rgba(124, 58, 237, 0.5)',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                title: (items) => {
                  return new Date(items[0].label).toLocaleDateString('en-IN', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                  });
                },
                label: (item) => {
                  return '₹' + formatNumber(item.parsed.y);
                }
              }
            }
          },
          scales: {
            x: {
              grid: {
                display: false,
                drawBorder: false
              },
              ticks: {
                color: '#999',
                maxTicksLimit: 8,
                callback: function(value, index, ticks) {
                  const date = new Date(this.getLabelForValue(value));
                  return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
                }
              }
            },
            y: {
              grid: {
                color: 'rgba(124, 58, 237, 0.1)',
                drawBorder: false
              },
              ticks: {
                color: '#999',
                callback: function(value) {
                  return '₹' + formatNumber(value);
                }
              }
            }
          }
        }
      });

      // Add event listeners to chart control buttons
      const chartBtns = document.querySelectorAll('.chart-control-btn');
      chartBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          chartBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          updateChart(btn.dataset.period);
        });
      });
    }

    // Filter price data based on period
    function filterPriceData(data, period) {
      if (period === 'ALL') return data;

      const now = new Date();
      const periodMap = {
        '1M': 30,
        '3M': 90,
        '6M': 180,
        '1Y': 365,
        '5Y': 1825
      };

      const days = periodMap[period] || 30;
      const cutoffDate = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);

      return data.filter(d => new Date(d.date) >= cutoffDate);
    }

    // Update chart with new period
    function updateChart(period) {
      if (!priceChart) return;

      const filteredData = filterPriceData(allPriceData, period);

      priceChart.data.labels = filteredData.map(d => d.date);
      priceChart.data.datasets[0].data = filteredData.map(d => d.price);
      priceChart.update();
    }

    // Show loading state
    function showLoading() {
      document.getElementById('headerContent').innerHTML = `
        <div class="loading-container" role="status" aria-live="polite" aria-label="Loading stock data">
          <div class="loading-spinner" aria-hidden="true"></div>
          <div class="loading-text">Loading stock data...</div>
        </div>
      `;
      document.getElementById('mainContent').innerHTML = '';
    }

    // Show error state
    function showError(title, message) {
      document.getElementById('headerContent').innerHTML = `
        <div class="error-container" role="alert" aria-live="assertive">
          <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12,2L1,21H23M12,6L19.53,19H4.47M11,10V14H13V10M11,16V18H13V16"/>
          </svg>
          <h1 class="error-title">${title}</h1>
          <p class="error-message">${message}</p>
          <a href="/search.html" class="btn-primary" aria-label="Return to stock search page">Back to Search</a>
        </div>
      `;
      document.getElementById('mainContent').innerHTML = '';
    }

    // Utility functions
    function formatNumber(num) {
      if (!num || isNaN(num)) return 'N/A';
      return Number(num).toLocaleString('en-IN', { maximumFractionDigits: 2 });
    }

    function formatLargeNumber(num) {
      if (!num || isNaN(num)) return 'N/A';

      const absNum = Math.abs(num);

      if (absNum >= 1e12) {
        return (num / 1e12).toFixed(2) + 'T';
      } else if (absNum >= 1e9) {
        return (num / 1e9).toFixed(2) + 'B';
      } else if (absNum >= 1e7) {
        return (num / 1e7).toFixed(2) + 'Cr';
      } else if (absNum >= 1e5) {
        return (num / 1e5).toFixed(2) + 'L';
      } else if (absNum >= 1e3) {
        return (num / 1e3).toFixed(2) + 'K';
      }

      return formatNumber(num);
    }

    function formatPercent(num) {
      if (!num || isNaN(num)) return 'N/A';
      return (num * 100).toFixed(2) + '%';
    }
  </script>
</body>
</html>
