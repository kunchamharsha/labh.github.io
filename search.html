<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Labh</title>
  <meta name="description" content="Search for stocks, mutual funds, and investment baskets on Labh.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/LOGO.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #5b21b6;
      --purple-light: #a78bfa;
      --black: #0a0a0a;
      --dark: #1a1a2e;
      --dark-surface: #16162a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--black);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2rem);
      max-width: 1200px;
      background-color: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 1rem;
      padding: 0.6rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.25rem;
    }

    .navbar-brand img {
      height: 32px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-link {
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: var(--purple-light);
    }

    .btn-primary {
      background-color: var(--purple);
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .btn-primary:hover {
      background-color: var(--purple-dark);
    }

    /* Search Hero Section */
    .search-hero {
      padding: 10rem 2rem 4rem;
      background: radial-gradient(ellipse at 50% 0%, var(--purple-dark) 0%, var(--black) 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      position: relative;
      overflow: hidden;
    }

    .search-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 20%, rgba(124, 58, 237, 0.15), transparent 60%);
      pointer-events: none;
    }

    .search-container {
      width: 100%;
      max-width: 800px;
      position: relative;
      z-index: 1;
    }

    .search-title {
      text-align: center;
      margin-bottom: 3rem;
    }

    .search-title h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff, var(--purple-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-title p {
      font-size: 1.25rem;
      color: #ccc;
    }

    /* Search Box */
    .search-box {
      position: relative;
      width: 100%;
      margin-bottom: 2rem;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(22, 22, 42, 0.8);
      border: 2px solid rgba(124, 58, 237, 0.3);
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .search-input-wrapper:focus-within {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
    }

    .search-icon {
      width: 24px;
      height: 24px;
      margin-right: 1rem;
      fill: var(--purple-light);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 1.125rem;
      font-family: 'Inter', sans-serif;
    }

    .search-input::placeholder {
      color: #999;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 1.5rem;
      padding: 0 0.5rem;
      display: none;
      transition: color 0.3s ease;
    }

    .clear-btn:hover {
      color: #fff;
    }

    .clear-btn.visible {
      display: block;
    }

    /* Autocomplete Dropdown */
    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(22, 22, 42, 0.95);
      border: 2px solid rgba(124, 58, 237, 0.3);
      border-top: none;
      border-radius: 0 0 1rem 1rem;
      margin-top: -0.5rem;
      max-height: 400px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      z-index: 10;
      display: none;
    }

    .autocomplete-dropdown.visible {
      display: block;
    }

    .autocomplete-item {
      padding: 1rem 1.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      border-bottom: 1px solid rgba(124, 58, 237, 0.1);
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover {
      background: rgba(124, 58, 237, 0.2);
    }

    .autocomplete-item-title {
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .autocomplete-item-subtitle {
      color: #999;
      font-size: 0.875rem;
    }

    .autocomplete-loading {
      padding: 1.5rem;
      text-align: center;
      color: #999;
    }

    .autocomplete-empty {
      padding: 1.5rem;
      text-align: center;
      color: #999;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(124, 58, 237, 0.3);
      border-radius: 50%;
      border-top-color: var(--purple);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Quick Filters */
    .quick-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .filter-chip {
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid var(--purple);
      color: var(--purple-light);
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-chip:hover {
      background: var(--purple);
      color: #fff;
    }

    .filter-chip.active {
      background: var(--purple);
      color: #fff;
    }

    /* Search Results */
    .search-results {
      padding: 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .results-header {
      margin-bottom: 2rem;
    }

    .results-header h2 {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .results-count {
      color: #999;
      font-size: 0.95rem;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .result-card {
      background: rgba(22, 22, 42, 0.6);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .result-card:hover {
      border-color: var(--purple);
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2);
      transform: translateY(-4px);
    }

    .result-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .result-title {
      color: #fff;
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .result-subtitle {
      color: #999;
      font-size: 0.875rem;
    }

    .result-badge {
      background: rgba(124, 58, 237, 0.2);
      color: var(--purple-light);
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .result-description {
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .result-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid rgba(124, 58, 237, 0.2);
    }

    .result-meta {
      color: #999;
      font-size: 0.875rem;
    }

    .result-action {
      color: var(--purple-light);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .result-action:hover {
      color: var(--purple);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      fill: #666;
    }

    .empty-state h3 {
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: #999;
      font-size: 1rem;
    }

    /* Popular Searches */
    .popular-searches {
      margin-top: 3rem;
    }

    .popular-searches h3 {
      color: #fff;
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .popular-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .popular-item {
      background: rgba(42, 42, 62, 0.6);
      border: 1px solid rgba(124, 58, 237, 0.2);
      color: #ccc;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .popular-item:hover {
      border-color: var(--purple);
      color: var(--purple-light);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .search-hero {
        padding: 8rem 1.5rem 3rem;
        min-height: 60vh;
      }

      .search-title h1 {
        font-size: 2.5rem;
      }

      .search-title p {
        font-size: 1rem;
      }

      .nav-links {
        display: none;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .quick-filters {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <img src="/assets/LOGO.png" alt="Labh Logo">
      Labh
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/search.html" class="nav-link">Search</a>
      <a href="https://calendar.app.google/gTCE7fH4o5fuSBpWA" class="btn-primary">Contact</a>
    </div>
  </nav>

  <!-- Search Hero -->
  <section class="search-hero">
    <div class="search-container">
      <div class="search-title">
        <h1>Find Your Investment</h1>
        <p>Search stocks</p>
      </div>

      <div class="search-box">
        <div class="search-input-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
          </svg>
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Enter company name"
            autocomplete="off"
          >
          <button class="clear-btn" id="clearBtn">&times;</button>
        </div>
        <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
      </div>

     
    </div>
  </section>

  <!-- Search Results -->
  <section class="search-results" id="searchResults">
    <div class="empty-state" id="emptyState">
      <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
      </svg>
      <h3>Start Your Search</h3>
      <p>Enter a keyword to find stocks</p>

      <div class="popular-searches">
        <h3>Popular Searches</h3>
        <div class="popular-list">
          <span class="popular-item">Large Cap Funds</span>
          <span class="popular-item">Technology Stocks</span>
          <span class="popular-item">Blue Chip Basket</span>
          <span class="popular-item">Index Funds</span>
          <span class="popular-item">Growth Stocks</span>
          <span class="popular-item">Dividend Funds</span>
        </div>
      </div>
    </div>

    <div id="resultsContainer" style="display: none;">
      <div class="results-header">
        <h2>Search Results</h2>
        <p class="results-count" id="resultsCount">0 results found</p>
      </div>
      <div class="results-grid" id="resultsGrid"></div>
    </div>
  </section>

  <script>
    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const autocompleteDropdown = document.getElementById('autocompleteDropdown');
    const filterChips = document.querySelectorAll('.filter-chip');
    const emptyState = document.getElementById('emptyState');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsGrid = document.getElementById('resultsGrid');
    const resultsCount = document.getElementById('resultsCount');
    const popularItems = document.querySelectorAll('.popular-item');

    let activeFilter = 'all';
    let debounceTimer = null;
    let currentResults = [];

    // API Configuration
    const API_URL = 'https://api.labh.io/open/stock-search';
    const DEBOUNCE_DELAY = 300; // milliseconds

    // Debounce function
    function debounce(func, delay) {
      return function(...args) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => func.apply(this, args), delay);
      };
    }

    // Fetch autocomplete results from API
    async function fetchAutocomplete(query) {
      try {
        const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
        if (!response.ok) {
          throw new Error('API request failed');
        }
        const data = await response.json();
        return data;
      } catch (error) {
        console.error('Error fetching autocomplete:', error);
        return [];
      }
    }

    // Show autocomplete dropdown
    function showAutocomplete(results) {
      if (results.length === 0) {
        autocompleteDropdown.innerHTML = `
          <div class="autocomplete-empty">No results found</div>
        `;
      } else {
        autocompleteDropdown.innerHTML = results.map(item => `
          <div class="autocomplete-item" data-symbol="${item.symbol || ''}" data-name="${item.name || item.title || ''}">
            <div class="autocomplete-item-title">${item.name || item.title || 'Unknown'}</div>
            <div class="autocomplete-item-subtitle">${item.symbol || item.type || ''}</div>
          </div>
        `).join('');

        // Add click listeners to autocomplete items
        const items = autocompleteDropdown.querySelectorAll('.autocomplete-item');
        items.forEach(item => {
          item.addEventListener('click', () => {
            const symbol = item.dataset.symbol;
            const name = item.dataset.name;

            // If we have a symbol, go directly to details page
            if (symbol) {
              window.location.href = `/stocks/details.html?symbol=${symbol}`;
            } else {
              // Otherwise, perform search
              searchInput.value = name;
              hideAutocomplete();
              performSearch(currentResults);
            }
          });
        });
      }

      autocompleteDropdown.classList.add('visible');
    }

    // Hide autocomplete dropdown
    function hideAutocomplete() {
      autocompleteDropdown.classList.remove('visible');
    }

    // Show loading state in autocomplete
    function showAutocompleteLoading() {
      autocompleteDropdown.innerHTML = `
        <div class="autocomplete-loading">
          <div class="loading-spinner"></div>
          <span style="margin-left: 0.5rem;">Searching...</span>
        </div>
      `;
      autocompleteDropdown.classList.add('visible');
    }

    // Search functionality with API integration
    const handleSearch = debounce(async (query) => {
      if (query.length === 0) {
        hideAutocomplete();
        currentResults = [];
        showEmptyState();
        return;
      }

      if (query.length < 2) {
        return; // Don't search for single characters
      }

      showAutocompleteLoading();

      const results = await fetchAutocomplete(query);
      currentResults = results;
      showAutocomplete(results);
    }, DEBOUNCE_DELAY);

    // Search input listener
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.trim();

      if (query.length > 0) {
        clearBtn.classList.add('visible');
      } else {
        clearBtn.classList.remove('visible');
        hideAutocomplete();
        showEmptyState();
      }

      handleSearch(query);
    });

    // Clear button
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      hideAutocomplete();
      currentResults = [];
      showEmptyState();
      searchInput.focus();
    });

    // Filter chips
    filterChips.forEach(chip => {
      chip.addEventListener('click', () => {
        filterChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;

        if (currentResults.length > 0) {
          performSearch(currentResults);
        }
      });
    });

    // Popular searches
    popularItems.forEach(item => {
      item.addEventListener('click', async () => {
        const query = item.textContent;
        searchInput.value = query;
        clearBtn.classList.add('visible');
        hideAutocomplete();

        showAutocompleteLoading();
        const results = await fetchAutocomplete(query);
        currentResults = results;
        performSearch(results);
      });
    });

    // Perform search and display results
    function performSearch(results) {
      hideAutocomplete();

      // Apply filter
      let filteredResults = results;
      if (activeFilter !== 'all') {
        filteredResults = results.filter(item => {
          const type = (item.type || '').toLowerCase();
          return type.includes(activeFilter) || activeFilter.includes(type);
        });
      }

      displayResults(filteredResults);
    }

    // Display results
    function displayResults(results) {
      if (results.length === 0) {
        emptyState.innerHTML = `
          <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4M13,9.94L14.06,11L15.12,9.94L16.18,11L17.24,9.94L15.12,7.82L13,9.94M8.88,9.94L9.94,11L11,9.94L8.88,7.82L6.76,9.94L7.82,11L8.88,9.94M12,17.5C14.33,17.5 16.31,16.04 17.11,14H6.89C7.69,16.04 9.67,17.5 12,17.5Z"/>
          </svg>
          <h3>No Results Found</h3>
          <p>Try adjusting your search or filters to find what you're looking for</p>
        `;
        emptyState.style.display = 'block';
        resultsContainer.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      resultsContainer.style.display = 'block';
      resultsCount.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found`;

      resultsGrid.innerHTML = results.map(item => {
        const name = item.name || item.title || 'Unknown';
        const symbol = item.symbol || item.ticker || '';
        const type = item.type || 'Stock';
        const description = item.description || `${name} - ${symbol}`;

        // Generate link based on type
        let link;
        if (type.toLowerCase().includes('mutual') || type.toLowerCase().includes('fund')) {
          link = item.link || '/mutual_funds.html';
        } else if (type.toLowerCase().includes('basket')) {
          link = item.link || '/stock_baskets.html';
        } else {
          // For stocks, link to details page
          link = `/stocks/details.html?symbol=${symbol}`;
        }

        const meta = item.meta || symbol;

        return `
          <div class="result-card" onclick="window.location.href='${link}'">
            <div class="result-card-header">
              <div>
                <div class="result-title">${name}</div>
                <div class="result-subtitle">${symbol}</div>
              </div>
              <span class="result-badge">${type}</span>
            </div>
            <p class="result-description">${description}</p>
            <div class="result-footer">
              <span class="result-meta">${meta}</span>
              <a href="${link}" class="result-action" onclick="event.stopPropagation()">
                View Details
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/>
                </svg>
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    // Show empty state
    function showEmptyState() {
      emptyState.innerHTML = `
        <svg class="empty-state-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
        </svg>
        <h3>Start Your Search</h3>
        <p>Enter a keyword to find stocks, mutual funds, or investment baskets</p>

        <div class="popular-searches">
          <h3>Popular Searches</h3>
          <div class="popular-list">
            <span class="popular-item">Large Cap Funds</span>
            <span class="popular-item">Technology Stocks</span>
            <span class="popular-item">Blue Chip Basket</span>
            <span class="popular-item">Index Funds</span>
            <span class="popular-item">Growth Stocks</span>
            <span class="popular-item">Dividend Funds</span>
          </div>
        </div>
      `;
      emptyState.style.display = 'block';
      resultsContainer.style.display = 'none';

      // Re-attach event listeners to popular items
      const newPopularItems = document.querySelectorAll('.popular-item');
      newPopularItems.forEach(item => {
        item.addEventListener('click', async () => {
          const query = item.textContent;
          searchInput.value = query;
          clearBtn.classList.add('visible');
          hideAutocomplete();

          showAutocompleteLoading();
          const results = await fetchAutocomplete(query);
          currentResults = results;
          performSearch(results);
        });
      });
    }

    // Close autocomplete when clicking outside
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !autocompleteDropdown.contains(e.target)) {
        hideAutocomplete();
      }
    });

    // Handle keyboard navigation
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideAutocomplete();
      } else if (e.key === 'Enter') {
        const firstItem = autocompleteDropdown.querySelector('.autocomplete-item');
        if (firstItem) {
          firstItem.click();
        } else if (currentResults.length > 0) {
          performSearch(currentResults);
        }
      }
    });

    // Focus search input on load
    searchInput.focus();
  </script>
